<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PhotoBridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d1b2e 0%, #0a1628 50%, #061020 100%);
    color: #eee; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px;
  }

  /* ── Splash ─────────────────────────────────── */
  #splash {
    display: flex; flex-direction: column; align-items: center;
    gap: 16px; text-align: center; max-width: 360px;
  }
  .logo { font-size: 4.5rem; }
  h1 { font-size: 1.5rem; color: #7ec8e3; font-weight: 700; }
  .sub { font-size: 0.9rem; color: #8899aa; line-height: 1.5; }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid rgba(126,200,227,0.15);
    border-top-color: #7ec8e3;
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .primary-btn {
    background: #7ec8e3; color: #0d1b2e; border: none;
    padding: 13px 36px; border-radius: 30px; font-size: 1rem;
    font-weight: 700; cursor: pointer; text-decoration: none;
    display: inline-block; margin-top: 4px;
    transition: opacity 0.2s;
  }
  .primary-btn:hover { opacity: 0.85; }
  .web-link {
    font-size: 0.82rem; color: #7ec8e3; cursor: pointer;
    text-decoration: underline; margin-top: 2px;
  }

  /* ── Upload UI ───────────────────────────────── */
  #upload-ui {
    display: none; width: 100%; max-width: 440px;
    flex-direction: column; align-items: center; gap: 16px;
  }
  #upload-ui h1 { font-size: 1.4rem; color: #7ec8e3; }
  .job-badge { font-size: 0.85rem; color: #aaa; }
  .drop-zone {
    border: 2px dashed rgba(126,200,227,0.4); border-radius: 16px;
    padding: 36px 20px; text-align: center; cursor: pointer;
    transition: background 0.2s, border-color 0.2s; width: 100%;
  }
  .drop-zone:hover, .drop-zone.over {
    background: rgba(126,200,227,0.07); border-color: #7ec8e3;
  }
  .drop-zone input[type=file] { display: none; }
  .dz-icon { font-size: 2.8rem; margin-bottom: 8px; }
  .hint { font-size: 0.82rem; color: #aaa; margin-top: 6px; }
  .upload-btn {
    background: #7ec8e3; color: #0d1b2e; border: none;
    padding: 13px 0; border-radius: 30px; font-size: 1rem;
    font-weight: 700; cursor: pointer; width: 100%;
    transition: opacity 0.2s;
  }
  .upload-btn:disabled { opacity: 0.42; cursor: not-allowed; }
  #status { font-size: 0.88rem; min-height: 1.3em; text-align: center; }
  .ok  { color: #4ade80; }
  .err { color: #f87171; }
  #preview { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  #preview img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
  .app-btn {
    font-size: 0.78rem; color: #7ec8e3;
    cursor: pointer; text-decoration: underline;
  }

  /* ── Chyba ──────────────────────────────────── */
  #error-ui {
    display: none; flex-direction: column; align-items: center;
    gap: 14px; text-align: center; max-width: 340px;
  }
  #error-ui .err-icon { font-size: 3rem; }
  #error-ui p { color: #f87171; font-size: 0.95rem; line-height: 1.5; }
</style>
</head>
<body>

<!-- Splash: deep link pokus -->
<div id="splash">
  <div class="logo">📷</div>
  <h1>PhotoBridge</h1>
  <div class="sub" id="splashSub">Otevírám aplikaci…</div>
  <div class="spinner" id="splashSpinner"></div>
  <a class="primary-btn" id="deepLinkBtn" href="#">Otevřít aplikaci</a>
  <span class="web-link" id="webFallbackLink">Použít webový formulář</span>
</div>

<!-- Upload UI -->
<div id="upload-ui">
  <h1>📷 PhotoBridge</h1>
  <div class="job-badge" id="jobBadge">Připraveno k příjmu</div>

  <div class="drop-zone" id="dropZone">
    <label for="fileInput">
      <div class="dz-icon">🖼️</div>
      <div>Klepněte pro výběr fotek</div>
      <div class="hint">JPG · PNG · WEBP · PDF · RAW</div>
    </label>
    <input type="file" id="fileInput" multiple
           accept="image/*,.pdf,.raw,.dng,.cr2,.nef,.arw">
  </div>

  <div id="preview"></div>
  <button class="upload-btn" id="uploadBtn" disabled>Nahrát fotky</button>
  <div id="status"></div>
  <span class="app-btn" id="tryAppBtn">Zkusit otevřít aplikaci znovu</span>
</div>

<!-- Chyba -->
<div id="error-ui">
  <div class="err-icon">⚠️</div>
  <p id="errorMsg">Neplatný odkaz.</p>
</div>

<script>
/* ══════════════════════════════════════════════════
   Načti parametry z URL
   QR generuje: http://IP:PORT/?t=TOKEN
   GitHub Pages: https://USER.github.io/photobridge/?host=IP&port=5000&t=TOKEN
   ══════════════════════════════════════════════════ */
const params = new URLSearchParams(window.location.search);
const TOKEN  = params.get("t")    || params.get("token") || "";
const HOST   = params.get("host") || "";
const PORT   = params.get("port") || "5000";
const JOB    = params.get("job")  || "";

const DEEP_LINK   = `photobridge://upload?t=${TOKEN}&host=${HOST}&port=${PORT}`;
const LOCAL_URL   = HOST ? `http://${HOST}:${PORT}/?t=${TOKEN}` : "";
const UPLOAD_URL  = HOST ? `http://${HOST}:${PORT}/upload?t=${TOKEN}` : "";

/* ── Validace ───────────────────────────────────── */
function showError(msg) {
  document.getElementById("splash").style.display    = "none";
  document.getElementById("upload-ui").style.display = "none";
  document.getElementById("error-ui").style.display  = "flex";
  document.getElementById("errorMsg").textContent    = msg;
}

if (!TOKEN) {
  showError("Chybí token. Naskenujte QR kód znovu.");
}

/* ── Deep link logika ───────────────────────────── */
let appOpened  = false;
let splashDone = false;

document.getElementById("deepLinkBtn").href = DEEP_LINK;

function showUploadUI() {
  if (splashDone || !TOKEN) return;
  splashDone = true;

  // Pokud nemáme host → nemůžeme uploadovat přes web
  if (!HOST) {
    showError("Aplikace nebyla otevřena a webový formulář není dostupný (chybí adresa serveru). Zkuste QR naskenovat znovu.");
    return;
  }

  document.getElementById("splash").style.display    = "none";
  document.getElementById("upload-ui").style.display = "flex";

  if (JOB) {
    document.getElementById("jobBadge").innerHTML =
      `Zakázka: <strong>${escHtml(JOB)}</strong>`;
  }
}

function tryDeepLink() {
  if (!TOKEN) return;
  window.location.href = DEEP_LINK;
}

// Spusť deep link ihned
tryDeepLink();

// Pokud se stránka skryje (app se otevřela) → nebudeme přesměrovávat
document.addEventListener("visibilitychange", () => {
  if (document.hidden) appOpened = true;
});

// Po 2.8 s → fallback na web UI
const fallbackTimer = setTimeout(() => {
  if (!appOpened) showUploadUI();
}, 2800);

document.getElementById("webFallbackLink").addEventListener("click", () => {
  clearTimeout(fallbackTimer);
  showUploadUI();
});

document.getElementById("deepLinkBtn").addEventListener("click", () => {
  appOpened = false;
  setTimeout(() => { if (!appOpened) showUploadUI(); }, 2800);
});

document.getElementById("tryAppBtn")?.addEventListener("click", () => {
  appOpened = false;
  splashDone = false;
  document.getElementById("splash").style.display    = "flex";
  document.getElementById("upload-ui").style.display = "none";
  tryDeepLink();
  setTimeout(() => { if (!appOpened) showUploadUI(); }, 2800);
});

/* ── Upload logika ──────────────────────────────── */
const fileInput = document.getElementById("fileInput");
const dropZone  = document.getElementById("dropZone");
const uploadBtn = document.getElementById("uploadBtn");
const statusEl  = document.getElementById("status");
const previewEl = document.getElementById("preview");
let selectedFiles = [];

function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className   = cls || "";
}

function showPreviews(files) {
  previewEl.innerHTML = "";
  Array.from(files).forEach(f => {
    if (!f.type.startsWith("image/")) return;
    const img = document.createElement("img");
    img.src   = URL.createObjectURL(f);
    previewEl.appendChild(img);
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

fileInput.addEventListener("change", () => {
  selectedFiles      = Array.from(fileInput.files);
  uploadBtn.disabled = !selectedFiles.length;
  setStatus(selectedFiles.length ? `Vybráno: ${selectedFiles.length} soubor(ů)` : "");
  showPreviews(selectedFiles);
});

dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("over");
  selectedFiles      = Array.from(e.dataTransfer.files);
  uploadBtn.disabled = !selectedFiles.length;
  setStatus(selectedFiles.length ? `Vybráno: ${selectedFiles.length} soubor(ů)` : "");
  showPreviews(selectedFiles);
});

uploadBtn.addEventListener("click", async () => {
  if (!selectedFiles.length || !UPLOAD_URL) return;
  uploadBtn.disabled = true;
  setStatus("Nahrávám…");

  const fd = new FormData();
  selectedFiles.forEach(f => fd.append("photos", f));

  try {
    const res  = await fetch(UPLOAD_URL, { method: "POST", body: fd });
    const data = await res.json();
    if (data.ok) {
      setStatus(`✅ Nahráno ${data.uploaded} soubor(ů). Díky!`, "ok");
      fileInput.value    = "";
      selectedFiles      = [];
      previewEl.innerHTML = "";
    } else {
      setStatus(`❌ Chyba: ${data.error}`, "err");
      uploadBtn.disabled = false;
    }
  } catch (e) {
    setStatus(`❌ Síťová chyba: ${e.message}`, "err");
    uploadBtn.disabled = false;
  }
});
</script>
</body>
</html>
